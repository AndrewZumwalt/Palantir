[camera]
device = 0
# Default 1080p -- common across every USB webcam and Pi CSI v2/v3.
# Crank further (2560x1440 / 3840x2160) if your hardware supports it
# and you want even more pixels per face for fine-detail recognition.
width = 1920
height = 1080
fps = 15
face_detection_interval = 1       # every N frames
engagement_interval = 5           # every N frames
object_detection_interval = 30    # every N frames

[audio]
device = "default"
sample_rate = 16000
channels = 1
chunk_duration_ms = 30            # audio chunk size for wake word
wake_word_threshold = 0.5            # 0.7 was too strict during demos
# Built-in openwakeword model.  Options: hey_jarvis (default), alexa,
# hey_mycroft, hey_rhasspy.  Set to a path (e.g. ./.dev-data/models/hey_palantir.onnx)
# to use a custom-trained model.
wake_word_model = "hey_jarvis"
stt_model = "base.en"
stt_compute_type = "int8"
stt_beam_size = 1
max_utterance_seconds = 30
silence_timeout_ms = 1500         # silence duration to end utterance

[identity]
face_match_threshold = 0.4
voice_match_threshold = 0.65
enrollment_face_samples = 10
enrollment_voice_samples = 5
identity_staleness_seconds = 10   # how long to use last-known position

[llm]
default_model = "claude-haiku-4-5-20251001"
complex_model = "claude-sonnet-4-6"
max_context_tokens = 4096
enable_prompt_caching = true
temperature = 0.7

[tts]
# Default to Microsoft Edge's neural TTS -- free, no API key, audibly
# more natural than Piper's local voices.  Needs internet.  Fall back
# to "piper" for fully-offline operation (requires the voice .onnx
# placed under .dev-data/models/piper/ first).
engine = "edge"
# Edge voice id.  Other good defaults:
#   en-US-AriaNeural        female, warm (classroom-friendly)
#   en-US-GuyNeural         male, casual
#   en-US-JennyNeural       female, professional
#   en-GB-RyanNeural        British male
#   en-GB-SoniaNeural       British female
# Run `edge-tts --list-voices` for the full catalogue.
voice = "en-US-AriaNeural"
sample_rate = 24000

[web]
host = "0.0.0.0"
port = 8080
# HTTPS: set both paths to enable. A self-signed cert will be generated on
# first boot if the files don't exist. Leave empty to serve plain HTTP
# (safe only behind a reverse proxy that terminates TLS).
tls_cert_file = ""
tls_key_file = ""

[privacy]
data_retention_days = 90
auto_delete_on_unenroll = true

[redis]
url = "unix:///var/run/redis/redis.sock"
# Fallback to TCP if unix socket not available
fallback_url = "redis://localhost:6379/0"

[engagement]
scoring_interval_seconds = 10
smoothing_window_seconds = 30
phone_confidence_threshold = 0.6
sleep_stillness_seconds = 30
cloud_validation_interval_seconds = 300  # 5 minutes

[attendance]
# Time without a face detection before the attendance tracker closes the
# record and marks the person "exited".  Dropped from the original 300s
# (5 minutes, which made the Present panel feel broken during demos:
# walk out of frame and the dashboard keeps you "present" for minutes)
# to 10s.  Brief occlusions / look-aways may now thrash a person between
# present + departed; raise this if that's a problem in production.
exit_timeout_seconds = 10

[automation]
enabled = true
allow_shell_commands = false  # DANGEROUS: enable only on trusted networks

[backup]
enabled = true
directory = "/var/lib/palantir/backups"
keep_last_n = 14              # ~2 weeks of daily snapshots
compress = true
